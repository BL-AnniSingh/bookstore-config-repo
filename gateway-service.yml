server:
  port: 9090

spring:
  application:
    name: GATEWAY-SERVICE

  cloud:

    gateway:

      discovery:
        locator:
          enabled: true

      routes:

        - id: product-service

          uri: lb://PRODUCT-SERVICE

          predicates:
            - Path=/api/products/**

eureka:
  client:
    service-url:
      defaultZone:
        http://localhost:8761/eureka/
